<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aarish Tiles - Admin Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">Aarish <span>Tiles</span></a>
            <div class="hamburger">☰</div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="find-mason.html">Find Mason</a></li>
                <li><a href="tiles-catalog.html">Tiles Catalog</a></li>
                <li><a href="mason-register.html">Mason Register</a></li>
                <li><a href="admin-login.html">Admin</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div style="max-width: 400px; margin: 3rem auto;">
            <div class="card" style="padding: 2rem;">
                <h2 class="text-center mb-2">🔐 एडमिन लॉगिन</h2>
                <p class="text-center mb-3" style="color: var(--gray);">केवल अधिकृत कर्मचारी</p>
                
                <form onsubmit="adminLogin(event)">
                    <div class="form-group">
                        <label class="form-label">यूज़रनेम</label>
                        <input type="text" class="form-control" id="username" placeholder="admin" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">पासवर्ड</label>
                        <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%;">लॉगिन करें</button>
                </form>
                
                <p class="text-center mt-2" style="font-size: 0.9rem;">
                    ⚠️ डेमो के लिए: कोई भी यूज़रनेम/पासवर्ड डालें
                </p>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2024 Aarish Tiles Network</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
