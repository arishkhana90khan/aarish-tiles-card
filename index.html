<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aarish Tiles Network | पहासू</title>
    <style>
        :root { --gold: #D4AF37; --black: #0b0b0b; --gray: #1a1a1a; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--black); color: var(--white); text-align: center; padding-bottom: 50px; }
        
        header { padding: 50px 20px; border-bottom: 3px solid var(--gold); background: #000; }
        .logo { font-size: 2.5rem; color: var(--gold); font-weight: 900; }
        
        .btn { display: inline-block; padding: 15px; margin: 10px; width: 90%; max-width: 350px; text-decoration: none; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; }
        .btn-call { background: var(--white); color: #000; }
        .btn-gold { background: var(--gold); color: #000; }

        .card { background: var(--gray); margin: 20px auto; padding: 25px; width: 95%; max-width: 600px; border-radius: 15px; border: 1px solid #333; text-align: left; }
        h2 { color: var(--gold); margin-bottom: 15px; font-size: 1.2rem; text-transform: uppercase; }

        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #000; color: #fff; }
        
        /* Dashboard */
        .progress-bar { background: #333; height: 25px; border-radius: 15px; margin: 15px 0; overflow: hidden; }
        .fill { background: var(--gold); height: 100%; width: 0%; transition: 1s; }
        .bonus-box { padding: 10px; background: rgba(212, 175, 55, 0.1); border-left: 4px solid var(--gold); margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <div class="logo">AARISH TILES</div>
    <p style="opacity:0.7;">पहासू का अपना भरोसेमंद नेटवर्क</p>
    <a href="tel:8755687268" class="btn btn-call">📞 कॉल: 8755687268</a>
</header>

<div class="card">
    <h2>📊 टाइल कैलकुलेटर</h2>
    <input type="number" id="ft_l" placeholder="लंबाई (Feet)">
    <input type="number" id="ft_w" placeholder="चौड़ाई (Feet)">
    <button onclick="calculate()" class="btn btn-gold" style="width:100%; margin:10px 0;">चेक करें</button>
    <div id="res" style="margin-top:10px; font-weight:bold; color:var(--gold);"></div>
</div>

<div class="card" id="mainPortal">
    <h2>🔐 मिस्त्री पार्टनर लॉगिन</h2>
    <div id="loginBox">
        <input type="password" id="userPin" placeholder="अपना 4 अंकों का पिन डालें">
        <button onclick="login()" class="btn btn-gold" style="width:100%; margin:10px 0;">लॉगिन करें</button>
    </div>

    <div id="dashboard" style="display:none;">
        <h3 id="uName" style="color:var(--gold);">---</h3>
        <p id="uCity" style="font-size:0.8rem; opacity:0.6;"></p>
        
        <div class="progress-bar"><div id="uBar" class="fill"></div></div>
        <p>टारगेट: <span id="uBags">0</span> / 1000 कट्टे</p>
        <div id="uBonus" class="bonus-box"></div>
        
        <div style="margin-top:20px;">
            <p style="font-size:0.8rem; color:var(--gold);">हालिया रिकॉर्ड:</p>
            <div id="uHistory" style="font-size:0.75rem; margin-top:5px; opacity:0.8;"></div>
        </div>
    </div>
</div>

<script>
    // 🔗 आपकी Google Sheet का लिंक
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQWgeMIGGRNoH1Fj0IKmZgYBgsbPNRoHIxeOU6CBL53o3mVkwp8-_f2Zm7YIqho9T9-qoUqgL2MpUVm/pub?gid=0&single=true&output=csv";
    
    let db = [];

    // डेटा लोड करना
    async function init() {
        try {
            const res = await fetch(sheetURL);
            const data = await res.text();
            const rows = data.split('\n').slice(1);
            db = rows.map(r => {
                const c = r.split(',');
                return { name: c[0], pin: c[1], bags: parseInt(c[2]), city: c[3], hist: c[4] };
            });
            console.log("System Ready");
        } catch(e) { alert("इंटरनेट या लिंक की समस्या!"); }
    }
    init();

    function calculate() {
        let l = document.getElementById('ft_l').value;
        let w = document.getElementById('ft_w').value;
        if(l && w) {
            let area = l * w;
            let boxes = Math.ceil((area * 1.1) / 4);
            document.getElementById('res').innerHTML = `कुल एरिया: ${area} Sq.Ft <br> जरूरी माल: ${boxes} पेटी (लगभग)`;
        }
    }

    function login() {
        let p = document.getElementById('userPin').value;
        let user = db.find(u => u.pin.trim() === p.trim());

        if(user) {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('uName').innerText = user.name;
            document.getElementById('uCity').innerText = "क्षेत्र: " + user.city;
            document.getElementById('uBags').innerText = user.bags;
            
            let per = (user.bags / 1000) * 100;
            document.getElementById('uBar').style.width = (per > 100 ? 100 : per) + "%";

            let bMsg = "";
            if(user.bags < 50) bMsg = "50 कट्टे पर ₹5,000 बोनस!";
            else if(user.bags < 100) bMsg = "100 कट्टे पर ₹12,000 बोनस!";
            else if(user.bags < 1000) bMsg = "जैकपॉट: 1000 कट्टे पर ₹1,50,000!";
            else bMsg = "बधाई! आपने ₹1.5 लाख जीत लिए!";
            document.getElementById('uBonus').innerText = bMsg;

            document.getElementById('uHistory').innerHTML = user.hist ? user.hist.replace(/\|/g, '<br>• ') : "कोई रिकॉर्ड नहीं";
        } else {
            alert("पिन गलत है! शीट चेक करें।");
        }
    }
</script>
</body>
</html>
