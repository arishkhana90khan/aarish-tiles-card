<!DOCTYPE html>
<html>
<head>
<title>Admin Panel - Aarish Tiles</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

h1{
text-align:center;
}

.card{
background:white;
padding:20px;
margin:15px 0;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,button{
width:100%;
padding:10px;
margin-top:10px;
}

button{
background:#0a7cff;
color:white;
border:none;
border-radius:5px;
}

</style>
</head>

<body>

<h1>Owner Admin Panel</h1>

<div class="card">

<h3>Add Mason</h3>

<input id="name" placeholder="Mason Name">
<input id="phone" placeholder="Phone">
<input id="village" placeholder="Village">
<input id="experience" placeholder="Experience">

<button onclick="addMason()">Add Mason</button>

</div>


<div class="card">

<h3>All Masons</h3>

<div id="masonList"></div>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyB-_sy4cKvvDjz0R4CNj84kejcjqsyBVsM",
authDomain: "aarish-tiles-network.firebaseapp.com",
projectId: "aarish-tiles-network",
storageBucket: "aarish-tiles-network.firebasestorage.app",
messagingSenderId: "1097113885546",
appId: "1:1097113885546:web:1b6bcdf8f3cfe20d9e2313",
measurementId: "G-G2N8FYWV63"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);



async function addMason(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let village=document.getElementById("village").value;
let experience=document.getElementById("experience").value;

await addDoc(collection(db,"masons"),{

name:name,
phone:phone,
village:village,
experience:experience

});

alert("Mason Added");

loadMasons();

}



async function loadMasons(){

let list=document.getElementById("masonList");

list.innerHTML="";

const querySnapshot = await getDocs(collection(db,"masons"));

querySnapshot.forEach((docData)=>{

let data=docData.data();

let div=document.createElement("div");

div.innerHTML=`

<p><b>${data.name}</b></p>
<p>${data.village}</p>
<p>${data.phone}</p>

<button onclick="deleteMason('${docData.id}')">Delete</button>

<hr>

`;

list.appendChild(div);

});

}



window.deleteMason=async function(id){

await deleteDoc(doc(db,"masons",id));

alert("Deleted");

loadMasons();

}



loadMasons();

</script>

</body>
</html>
