<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>मिस्त्री रजिस्ट्रेशन - आरिश टाइल्स</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #050505; color: white; padding: 15px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        .register-box {
            background: #1a1a1a;
            max-width: 500px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 40px;
            border: 2px solid #D4AF37;
        }
        
        h2 {
            color: #D4AF37;
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            color: #888;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-weight: 500;
        }
        
        .input-group input, .input-group select, .input-group textarea {
            width: 100%;
            padding: 15px;
            background: black;
            border: 1px solid #333;
            border-radius: 15px;
            color: white;
            font-size: 16px;
        }
        
        .input-group input:focus, .input-group select:focus {
            border-color: #D4AF37;
            outline: none;
        }
        
        .file-input {
            border: 2px dashed #D4AF37;
            padding: 30px;
            text-align: center;
            border-radius: 15px;
            cursor: pointer;
        }
        
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: #D4AF37;
            color: black;
            border: none;
            border-radius: 50px;
            font-weight: 900;
            font-size: 18px;
            cursor: pointer;
            margin: 20px 0;
            transition: 0.3s;
        }
        
        .submit-btn:hover {
            transform: scale(1.02);
            border: 2px solid white;
        }
        
        .success-message {
            background: #4CAF50;
            color: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            margin: 20px 0;
            display: none;
        }
        
        .error-message {
            background: #f44336;
            color: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            margin: 20px 0;
            display: none;
        }
        
        .back-link {
            display: block;
            text-align: center;
            color: #D4AF37;
            text-decoration: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="register-box">
    <h2>👷 मिस्त्री रजिस्ट्रेशन</h2>
    <p class="subtitle">आरिश टाइल्स नेटवर्क से जुड़ें</p>
    
    <form id="registrationForm">
        <div class="input-group">
            <label>पूरा नाम <span style="color: #D4AF37;">*</span></label>
            <input type="text" id="name" placeholder="जैसे: रफीक मिस्त्री" required>
        </div>
        
        <div class="input-group">
            <label>मोबाइल नंबर <span style="color: #D4AF37;">*</span></label>
            <input type="tel" id="phone" placeholder="9876543210" maxlength="10" required>
        </div>
        
        <div class="input-group">
            <label>गांव <span style="color: #D4AF37;">*</span></label>
            <input type="text" id="village" placeholder="जैसे: पहासू, खैर, चांदपुर" required>
        </div>
        
        <div class="input-group">
            <label>अनुभव (साल में) <span style="color: #D4AF37;">*</span></label>
            <input type="number" id="experience" min="1" max="50" placeholder="10" required>
        </div>
        
        <div class="input-group">
            <label>आप किस काम में माहिर हैं?</label>
            <select id="specialty">
                <option>फ्लोर टाइल</option>
                <option>वॉल टाइल</option>
                <option>बाथरूम टाइल</option>
                <option>किचन टाइल</option>
                <option>सभी टाइल</option>
            </select>
        </div>
        
        <div class="input-group">
            <label>अपनी फोटो</label>
            <div class="file-input" onclick="document.getElementById('photo').click()">
                <i class="fas fa-camera" style="font-size: 30px; color: #D4AF37;"></i>
                <p id="photoName">फोटो चुनने के लिए क्लिक करें</p>
                <input type="file" id="photo" accept="image/*" style="display: none;">
            </div>
        </div>
        
        <div class="input-group">
            <label>अपने बारे में थोड़ा</label>
            <textarea id="bio" rows="3" placeholder="जैसे: 10 साल से टाइल का काम कर रहा हूँ..."></textarea>
        </div>
        
        <button type="submit" class="submit-btn">
            <i class="fas fa-paper-plane"></i> रजिस्टर करें
        </button>
    </form>
    
    <div id="successMessage" class="success-message">
        <i class="fas fa-check-circle"></i> रजिस्ट्रेशन सफल! एडमिन जल्द approve करेगा।
    </div>
    
    <div id="errorMessage" class="error-message"></div>
    
    <a href="index.html" class="back-link">← होम पेज पर वापस जाएं</a>
</div>

<!-- Firebase Modules -->
<script type="module">
    import { db, storage, collection, addDoc, ref, uploadBytes, getDownloadURL } from './firebase-config.js';

    const form = document.getElementById('registrationForm');
    const successMsg = document.getElementById('successMessage');
    const errorMsg = document.getElementById('errorMessage');
    
    // फोटो चुनने पर नाम दिखाएं
    document.getElementById('photo').addEventListener('change', function(e) {
        if (this.files[0]) {
            document.getElementById('photoName').innerText = this.files[0].name;
        }
    });
    
    // फॉर्म सबमिट
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // वैलिडेशन
        const name = document.getElementById('name').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const village = document.getElementById('village').value.trim();
        const experience = document.getElementById('experience').value;
        
        if (!name || !phone || !village || !experience) {
            showError("सभी जरूरी फील्ड भरें!");
            return;
        }
        
        if (phone.length !== 10 || !/^\d+$/.test(phone)) {
            showError("सही मोबाइल नंबर डालें (10 अंक)!");
            return;
        }
        
        if (experience < 1 || experience > 50) {
            showError("अनुभव 1 से 50 साल के बीच होना चाहिए!");
            return;
        }
        
        try {
            // फोटो अपलोड करें (अगर चुनी है)
            let photoURL = '';
            const photoFile = document.getElementById('photo').files[0];
            
            if (photoFile) {
                const storageRef = ref(storage, `mason-photos/${Date.now()}_${photoFile.name}`);
                await uploadBytes(storageRef, photoFile);
                photoURL = await getDownloadURL(storageRef);
            }
            
            // डेटा Firestore में सेव करें
            const masonData = {
                name: name,
                phone: phone,
                village: village,
                experience: parseInt(experience),
                specialty: document.getElementById('specialty').value,
                bio: document.getElementById('bio').value.trim() || '',
                photo: photoURL || '',
                rating: 4.0,
                bags: 0,
                approved: false,  // एडमिन approve करेगा
                registeredAt: new Date().toLocaleDateString('hi-IN')
            };
            
            await addDoc(collection(db, "masons"), masonData);
            
            // सक्सेस मैसेज दिखाएं
            successMsg.style.display = 'block';
            form.reset();
            document.getElementById('photoName').innerText = 'फोटो चुनने के लिए क्लिक करें';
            
            // 5 सेकंड बाद होम पेज पर भेजें
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 5000);
            
        } catch (error) {
            console.error("Registration error:", error);
            showError("रजिस्ट्रेशन में समस्या हुई: " + error.message);
        }
    });
    
    function showError(message) {
        errorMsg.innerText = message;
        errorMsg.style.display = 'block';
        setTimeout(() => {
            errorMsg.style.display = 'none';
        }, 3000);
    }
</script>
</body>
      </html>
